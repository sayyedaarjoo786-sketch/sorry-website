<!DOCTYPE html>
<html>
<head>
<title>I'm Sorry ❤️</title>

<style>

body{
font-family: Arial;
text-align:center;
background:#ffd6e7;
overflow:hidden;
height:100vh;
margin:0;
}

/* heading */

h1{
margin-top:150px;
color:#ff2e6e;
font-size:40px;
}

/* buttons */

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#333;
color:white;
position:absolute;
}

/* floating emojis */

.emoji{
position:absolute;
font-size:28px;
animation:float 7s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-100vh);}
}

/* sparkles */

.sparkle{
position:absolute;
font-size:16px;
color:white;
animation:sparkle 3s linear infinite;
}

@keyframes sparkle{
0%{opacity:0}
50%{opacity:1}
100%{opacity:0}
}

</style>
</head>

<body>

<h1 id="question">sirf ek minute meri baat sunlo? 🥺</h1>

<button id="yes" onclick="nextQuestion()">Yes ❤️</button>
<button id="no" onmouseover="moveNo()">No 😡</button>

<script>

/* questions */

let questions=[
"Kya abhi tak mujhse naraz ho? 😭",
"Aap mujhse bohot jyada pyaar karte ho n? 🥺",
"To fir aise naraz mat ho n? ❤️",
"Kya hum wapas acchese baate kar sakte hai? 💬",
"So… will you forgive me? 💖"
];

let i=0;

function nextQuestion(){

if(i<questions.length){

document.getElementById("question").innerText=questions[i];
i++;

}

else{

document.body.innerHTML="<h1>Thank you for forgiving me ❤️</h1><p>You mean a lot to me 🥺</p>";

}

}

/* no button running */

function moveNo(){

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

document.getElementById("no").style.left=x+"px";
document.getElementById("no").style.top=y+"px";

}

/* floating emojis */

let emojis=["❤️","💖","💕","😍","🥺","😘"];

for(let i=0;i<30;i++){

let e=document.createElement("div");
e.className="emoji";
e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];

e.style.left=Math.random()*100+"vw";
e.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(e);

}

/* sparkles */

for(let i=0;i<40;i++){

let s=document.createElement("div");

s.className="sparkle";

s.innerHTML="✨";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

}

</script>

</body>
</html>
