<!DOCTYPE html>
<html>
<head>
<title>I'm Sorry ❤️</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#ffd6e7;
margin-top:150px;
}

button{
padding:12px 25px;
font-size:18px;
margin:10px;
border:none;
border-radius:10px;
cursor:pointer;
}

#yes{
background:#ff4d88;
color:white;
}

#no{
background:#333;
color:white;
position:absolute;
}
</style>
</head>

<body>

<h1>I’m really sorry ❤️</h1>
<p>Bus 1 minute ke liye meri baat sunlo? 🥺</p>

<button id="yes" onclick="openQuestions()">Yes 💖</button>
<button id="no" onmouseover="moveNo()">No 😡</button>

<script>

function openQuestions(){
window.open("questions.html","_blank");
}

function moveNo(){
let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;
document.getElementById("no").style.left=x+"px";
document.getElementById("no").style.top=y+"px";
}

</script>

</body>
</html>
